<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Legacy Store</title>
    
    <!-- Pi SDK untuk sambungan akaun -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <!-- Fail CSS -->
    <link rel="stylesheet" href="css/gaya_reka_bentuk.css">
</head>
<body>

    <div id="app-interface"></div>

    <!-- Fail Bahasa -->
    <script src="bahasa-english"></script>
    <script src="bahasa-melayu"></script>
    <script src="bahasa-indon"></script>
    <script src="bahasa-arab"></script>
    <script src="bahasa-china"></script>
    <script src="bahasa-korea"></script>
    <script src="bahasa-vietnam"></script>
    <script src="bahasa-filipino"></script>

    <!-- Fail Logik Folder JS -->
    <script src="js/shared.js"></script>
    <script src="js/i18n.js"></script>

    <!-- Fail API & Butang -->
    <script src="api/approve.js"></script>
    <script src="api/complete.js"></script>
    <script src="butang"></script>

    <script>
        window.onload = function() {
            fetch('visual-kedai')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('app-interface').innerHTML = data;
                    if(typeof changeLang === "function") changeLang('ms');
                })
                .catch(err => console.error("Ralat visual-kedai:", err));
        };
    </script>

</body>
</html>
