<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Legacy Store</title>
    
    <!-- CSS daripada folder css -->
    <link rel="stylesheet" href="css/gaya_reka_bentuk.css">
</head>
<body>

    <div id="app-interface"></div>

    <!-- Fail Bahasa (Tanpa .js seperti dalam Screenshot) -->
    <script src="bahasa-english"></script>
    <script src="bahasa-melayu"></script>
    <script src="bahasa-indon"></script>
    <script src="bahasa-arab"></script>
    <script src="bahasa-china"></script>
    <script src="bahasa-korea"></script>
    <script src="bahasa-vietnam"></script>
    <script src="bahasa-filipino"></script>

    <!-- Fail Logik daripada folder js -->
    <script src="js/shared.js"></script>
    <script src="js/i18n.js"></script>

    <!-- Fail API untuk Transaksi Pi -->
    <script src="api/approve.js"></script>
    <script src="api/complete.js"></script>

    <!-- Fail Butang Utama -->
    <script src="butang"></script>

    <script>
        window.onload = function() {
            // Memanggil visual-kedai
            fetch('visual-kedai')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('app-interface').innerHTML = data;
                    // Memulakan fungsi bahasa daripada fail butang/i18n
                    if(typeof changeLang === "function") {
                        changeLang('ms'); 
                    }
                })
                .catch(err => console.error("Gagal memuatkan visual-kedai:", err));
        };
    </script>

</body>
</html>
